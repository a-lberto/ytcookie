<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 200px;
            padding: 10px;
            font-family: sans-serif;
        }
        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
            background-color: #f00;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #d00;
        }
        #status {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <button id="extract">Download Cookies</button>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>
</html>
