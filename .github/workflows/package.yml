name: Package Extension

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version
        id: get_version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Package for Firefox (Desktop & Android)
        run: |
          npx web-ext build --source-dir . --artifacts-dir dist/firefox --overwrite-dest

      - name: Package for Chrome
        run: |
          mkdir -p dist/chrome
          zip -r dist/chrome/ytcookie-chrome-v${{ steps.get_version.outputs.version }}.zip . -x "node_modules/*" "tests/*" ".git/*" ".github/*" "dist/*" "*.md" "package*" "package-lock.json"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-packages
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/firefox/*.xpi
            artifacts/chrome/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
